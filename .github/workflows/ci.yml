name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Black Check
      run: |
        black --check .

    - name: Run Isort Check
      run: |
        isort --check-only .

    - name: Run Flake8
      run: |
        flake8 .

    - name: Run Pylint
      run: |
        pylint app/ tests/ app.py || true

    - name: Run Pytest & Generate Coverage Report
      run: |
        pytest --cov=app --cov-report=xml --cov-fail-under=90

    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage.xml

    - name: Build Docker Image
      run: |
        docker build -t todo-app-image .

    - name: Save Docker Image Artifact
      run: |
        docker save todo-app-image > todo-app-image.tar

    - name: Upload Docker Image Artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: todo-app-image.tar
